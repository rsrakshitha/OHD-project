<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Request List</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

    <style>
        table {
            table-layout: fixed;
            width: 100%;
            border: 2px solid black; /* outer border */
        }

        th, td {
            border: 1px solid black !important; /* inner borders */
            padding: 8px;
            word-wrap: break-word;
            vertical-align: middle;
            font-size: 14px;
        }

        th {
            text-align: center;
            background-color: #e9ecef;
        }

        td {
            text-align: left;
        }

        .actions a {
            margin: 2px;
        }
    </style>
</head>

<body>
<div class="container mt-4">

    <h2>All Requests</h2>

    <!-- Filter Form -->
    <form method="get" action="/list" class="mb-3">
        <label>Filter by Status:</label>
        <select name="status" class="form-select d-inline w-auto">
            <option value="">All</option>
            <option value="UNASSIGNED">Unassigned</option>
            <option value="ASSIGNED">Assigned</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="CLOSED">Closed</option>
            <option value="REJECTED">Rejected</option>
        </select>
        <button type="submit" class="btn btn-primary btn-sm">Filter</button>
    </form>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-striped">
            <thead class="text-center">
                <tr>
                    <th style="width:10%">Title</th>
                    <th style="width:20%">Description</th>
                    <th style="width:8%">Priority</th>
                    <th style="width:8%">Severity</th>
                    <th style="width:12%">Status</th>
                    <th style="width:12%">Assigned To</th>
                    <th style="width:10%">Facility</th>
                    <th style="width:20%">Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="r : ${requests}">
                    <td th:text="${r.title}"></td>
                    <td th:text="${r.description}"></td>
                    <td th:text="${r.priority}"></td>
                    <td th:text="${r.severity}"></td>
                    <td th:text="${r.status}"></td>
                    <td th:text="${r.assignedTo != null ? r.assignedTo : 'Not Assigned'}"></td>
                    <td th:text="${r.facility}"></td>

                    <td class="actions text-center">
                        <a th:href="@{/updateStatus/{id}(id=${r.id})}" class="btn btn-info btn-sm">Update</a>
                        <a th:href="@{/assign/{id}(id=${r.id})}" class="btn btn-warning btn-sm">Assign</a>
                        <a th:href="@{/close/{id}(id=${r.id})}" class="btn btn-success btn-sm">Close</a>
                        <a th:href="@{'/reject/' + ${r.id}}" class="btn btn-danger btn-sm">Reject</a>

                        <!-- Delete with confirmation -->
                        <a th:href="@{'/delete/' + ${r.id}}"
                           th:onclick="|return confirm('Are you sure you want to delete this request?');|"
                           class="btn btn-dark btn-sm">
                           Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="/home" class="btn btn-secondary mt-3">Back to Home</a>

</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
