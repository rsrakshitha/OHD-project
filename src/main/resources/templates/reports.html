<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Report</title>
</head>
<body>

<h2>Report</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Status</th>
    </tr>

    <tr th:each="req : ${requests}">
        <td th:text="${req.id}"></td>
        <td th:text="${req.title}"></td>
        <td th:text="${req.status}"></td>
    </tr>
</table>

<br>
<a href="/home">Back</a>

</body>
</html>
