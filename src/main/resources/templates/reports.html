<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Request Report</title>
</head>
<body>

<h2>Request Report</h2>

<!-- Summary -->
<p>Total Requests: <span th:text="${total}">0</span></p>
<p>Open Requests: <span th:text="${open}">0</span></p>
<p>Closed Requests: <span th:text="${closed}">0</span></p>
<p>Rejected Requests: <span th:text="${rejected}">0</span></p>

<!-- Requests Table -->
<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Assigned To</th>
    </tr>

    <tr th:each="req : ${requests}">
        <td th:text="${req.id}"></td>
        <td th:text="${req.title}"></td>
        <td th:text="${req.status}"></td>
        <td th:text="${req.priority}"></td>
        <td th:text="${req.assignedTo != null ? req.assignedTo : 'Not Assigned'}"></td>
    </tr>
</table>

<br>
<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
