<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Requests</title>
</head>
<body>

<h2>All Requests</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Facility</th>
    </tr>

    <tr th:each="req : ${requests}">
        <td th:text="${req.id}"></td>
        <td th:text="${req.title}"></td>
        <td th:text="${req.description}"></td>
        <td th:text="${req.status}"></td>
        <td th:text="${req.priority}"></td>
        <td th:text="${req.facility}"></td>
    </tr>

</table>

</body>
</html>
